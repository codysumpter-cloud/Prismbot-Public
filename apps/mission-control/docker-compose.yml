services:
  mission-control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mission-control
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8790}:${PORT:-8790}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${PORT:-8790}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
