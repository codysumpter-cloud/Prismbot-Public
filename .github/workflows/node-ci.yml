name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax check (kid-chat MVP)
        run: node --check apps/kid-chat-mvp/server.js

      - name: Smoke test server boot
        run: |
          node apps/kid-chat-mvp/server.js &
          PID=$!
          sleep 2
          curl -fsS http://127.0.0.1:8787/ >/dev/null
          kill $PID
