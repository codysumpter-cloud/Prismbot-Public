name: Promptfoo Evals

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'evals/promptfoo/**'
      - '.github/workflows/promptfoo-evals.yml'

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify OPENAI_API_KEY secret exists
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is not configured. Skipping promptfoo eval job."
            exit 0
          fi

      - name: Run promptfoo eval
        working-directory: evals/promptfoo
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npx promptfoo@latest eval -c promptfooconfig.yaml
