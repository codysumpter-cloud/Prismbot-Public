<!doctype html><html lang="en"><head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Boss Lab</title>
<style>
body{margin:0;background:#0b122d;color:#fff;font-family:monospace;display:grid;place-items:center;min-height:100vh}
.wrap{display:grid;gap:8px;justify-items:center;padding:10px;max-width:96vw}
canvas{width:min(92vw,480px);height:auto;image-rendering:pixelated;border:3px solid #8aa0ff;background:#5cb7ff}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
button{background:#1b2458;color:#fff;border:1px solid #5e76ff;padding:8px 12px}
.pad{display:grid;grid-template-columns:repeat(3,70px);gap:6px;justify-content:center}.pad button{height:44px}
</style></head><body>
<div class="wrap"><h3>Boss Lab</h3>
<canvas id="g" width="400" height="520"></canvas>
<div id="ui">Score 0 · Lives 3 · Phase 1 · Best 0</div>
<div class="row"><button id="pause">Pause</button><button id="restart">Restart</button><span>Dodge pattern waves</span></div>
<div class="pad"><button></button><button id="u">▲</button><button></button><button id="l">◀</button><button id="d">▼</button><button id="r">▶</button></div>
</div>
<script>
let _last=0;function submitScore(s){try{s=+s||0;if(s<=0||s<=_last)return;_last=s;const pk=(localStorage.getItem('pixel_player_key')||('pk_'+Math.random().toString(36).slice(2)+Date.now().toString(36)));localStorage.setItem('pixel_player_key',pk);fetch('/wp-json/prismtek/v1/scores',{method:'POST',credentials:'include',cache:'no-store',headers:{'content-type':'application/json'},body:JSON.stringify({game:'boss-lab',score:s,name:(localStorage.getItem('pixel_player_name')||'Guest'),playerKey:pk})}).catch(()=>{});}catch{}}
const c=g,x=c.getContext('2d');const W=400,H=520;let best=+localStorage.bl_best||0;
let score=0,lives=3,phase=1,paused=false,over=false,keys=new Set();let p={x:200,y:430,r:11,s:2.5};let bullets=[],tick=0;
function rr(a,b){return a+Math.random()*(b-a)}
function restart(){score=0;lives=3;phase=1;paused=false;over=false;p={x:200,y:430,r:11,s:2.5};bullets=[];tick=0;sync();pause.textContent='Pause';}
function sync(){ui.textContent=`Score ${score} · Lives ${lives} · Phase ${phase} · Best ${best}`}
function spawn(){const cx=200,cy=90;for(let i=0;i<8+phase;i++){const a=(Math.PI*2/(8+phase))*i + tick*0.05;bullets.push({x:cx,y:cy,vx:Math.cos(a)*(1.6+phase*0.16),vy:Math.sin(a)*(1.6+phase*0.16),r:5});}}
function update(){if(paused||over)return;tick++;if(tick%30===0)spawn();let dx=0,dy=0;if(keys.has('arrowleft')||keys.has('a'))dx=-1;if(keys.has('arrowright')||keys.has('d'))dx=1;if(keys.has('arrowup')||keys.has('w'))dy=-1;if(keys.has('arrowdown')||keys.has('s'))dy=1;const d=Math.hypot(dx,dy)||1;p.x=Math.max(14,Math.min(W-14,p.x+dx/d*p.s));p.y=Math.max(80,Math.min(H-14,p.y+dy/d*p.s));
for(const b of bullets){b.x+=b.vx;b.y+=b.vy;const hit=(p.x-b.x)**2+(p.y-b.y)**2<(p.r+b.r)**2;if(hit){lives--;b.dead=true;if(lives<=0){over=true;if(score>best){best=score;localStorage.bl_best=best;submitScore(best)}}}}
bullets=bullets.filter(b=>!b.dead&&b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20);score+=2;if(score>best){best=score;localStorage.bl_best=best;submitScore(best)}phase=1+Math.floor(score/500);sync();}
function draw(){x.fillStyle='#64c5ff';x.fillRect(0,0,W,H);x.fillStyle='#6dbc56';x.fillRect(0,390,W,130);x.fillStyle='#1f324a';x.fillRect(28,76,344,330);
x.fillStyle='#ff6b8b';x.fillRect(164,96,72,28);x.fillStyle='#ffd6de';x.fillRect(176,104,48,12);
for(const b of bullets){x.fillStyle='#ffe066';x.beginPath();x.arc(b.x,b.y,b.r,0,7);x.fill();}
x.fillStyle='#66e7ff';x.beginPath();x.arc(p.x,p.y,p.r,0,7);x.fill();
if(over){x.fillStyle='rgba(0,0,0,.65)';x.fillRect(58,205,284,110);x.fillStyle='#fff';x.fillText('Game Over',146,248);x.fillText('Tap restart or press R',118,274)}
if(paused&&!over){x.fillStyle='rgba(0,0,0,.55)';x.fillRect(120,220,160,70);x.fillStyle='#fff';x.fillText('Paused',172,260)}}
function loop(){update();draw();requestAnimationFrame(loop)}
addEventListener('keydown',e=>{keys.add(e.key.toLowerCase());if(e.key==='r')restart();if(e.key==='p'){paused=!paused;pause.textContent=paused?'Resume':'Pause'}});addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));
u.onpointerdown=()=>keys.add('arrowup');d.onpointerdown=()=>keys.add('arrowdown');l.onpointerdown=()=>keys.add('arrowleft');r.onpointerdown=()=>keys.add('arrowright');for(const b of [u,d,l,r]) b.onpointerup=()=>{keys.delete('arrowup');keys.delete('arrowdown');keys.delete('arrowleft');keys.delete('arrowright');};
pause.onclick=()=>{if(over)return;paused=!paused;pause.textContent=paused?'Resume':'Pause'};restart.onclick=restart;
submitScore(best);restart();requestAnimationFrame(loop);
</script></body></html>
