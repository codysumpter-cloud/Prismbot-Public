<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Crystal Cavern Miner</title>
<style>
body{margin:0;background:#0b122d;color:#fff;font-family:monospace;display:grid;place-items:center;min-height:100vh}
.wrap{display:grid;gap:8px;justify-items:center;padding:10px;max-width:96vw}
canvas{width:min(92vw,480px);height:auto;image-rendering:pixelated;border:3px solid #8aa0ff;background:#5cb7ff}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
button{background:#1b2458;color:#fff;border:1px solid #5e76ff;padding:8px 12px}
.pad{display:grid;grid-template-columns:repeat(3,70px);gap:6px;justify-content:center}
.pad button{height:44px}
</style></head>
<body><div class="wrap">
<h3>Crystal Cavern Miner</h3>
<canvas id="g" width="400" height="520"></canvas>
<div id="ui">Score 0 · Depth 0m · O2 100 · Best 0</div>
<div class="row"><button id="pause">Pause</button><button id="restart">Restart</button><span>Collect crystals, avoid rocks</span></div>
<div class="pad"><button></button><button id="u">▲</button><button></button><button id="l">◀</button><button id="d">▼</button><button id="r">▶</button></div>
</div>
<script>
let _last=0;function submitScore(s){try{s=+s||0;if(s<=0||s<=_last)return;_last=s;const pk=(localStorage.getItem('pixel_player_key')||('pk_'+Math.random().toString(36).slice(2)+Date.now().toString(36)));localStorage.setItem('pixel_player_key',pk);fetch('/wp-json/prismtek/v1/scores',{method:'POST',credentials:'include',cache:'no-store',headers:{'content-type':'application/json'},body:JSON.stringify({game:'crystal-cavern-miner',score:s,name:(localStorage.getItem('pixel_player_name')||'Guest'),playerKey:pk})}).catch(()=>{});}catch{}}
const c=g,x=c.getContext('2d');const W=400,H=520;let best=+localStorage.ccm_best||0;
let score=0,depth=0,o2=100,paused=false,over=false,keys=new Set(),p={x:200,y:430,w:24,h:28,s:2.5},items=[],t=0;
function rr(a,b){return a+Math.random()*(b-a)}
function spawn(y=-20){const crystal=Math.random()<0.35;items.push({x:rr(20,W-20),y,w:crystal?12:18,h:crystal?12:18,t:crystal?'c':'r',v:rr(1.4,2.3)})}
function restart(){score=0;depth=0;o2=100;paused=false;over=false;keys.clear();p={x:200,y:430,w:24,h:28,s:2.5};items=[];for(let i=0;i<18;i++)spawn(-i*28);sync();pause.textContent='Pause';}
function sync(){ui.textContent=`Score ${score} · Depth ${depth|0}m · O2 ${Math.max(0,o2|0)} · Best ${best}`}
function update(dt){if(paused||over)return;t+=dt;depth += 0.12*dt;o2 -= 0.06*dt; if(Math.random()<0.09)spawn();
let dx=0,dy=0;if(keys.has('arrowleft')||keys.has('a'))dx=-1;if(keys.has('arrowright')||keys.has('d'))dx=1;if(keys.has('arrowup')||keys.has('w'))dy=-1;if(keys.has('arrowdown')||keys.has('s'))dy=1;
p.x=Math.max(10,Math.min(W-10-p.w,p.x+dx*p.s*dt));p.y=Math.max(90,Math.min(H-20-p.h,p.y+dy*p.s*dt));
for(const it of items){it.y += (it.v + Math.min(2.4,depth/130))*dt; if(it.y>560){it.y=-20;it.x=rr(20,W-20);it.t=Math.random()<0.35?'c':'r';it.w=it.h=it.t==='c'?12:18;}}
for(const it of items){if(p.x<it.x+it.w&&p.x+p.w>it.x&&p.y<it.y+it.h&&p.y+p.h>it.y){if(it.t==='c'){score+=70;o2=Math.min(100,o2+5);}else{o2-=16;score=Math.max(0,score-20);}it.y=560;if(score>best){best=score;localStorage.ccm_best=best;submitScore(best)}}}
if(o2<=0){over=true;if(score>best){best=score;localStorage.ccm_best=best;submitScore(best)}}
score += Math.floor(dt*0.22);sync();}
function draw(){x.fillStyle='#64c5ff';x.fillRect(0,0,W,H);x.fillStyle='#1f324a';x.fillRect(0,80,W,440);x.fillStyle='#2a415c';for(let i=0;i<18;i++)x.fillRect(i*24 + ((t*0.8)%24),80,1,440);
for(const it of items){x.fillStyle=it.t==='c'?'#8ef8ff':'#ff8d98';x.fillRect(it.x,it.y,it.w,it.h)}
x.fillStyle='#ffe08a';x.fillRect(p.x,p.y,p.w,p.h);x.fillStyle='#caa84c';x.fillRect(p.x+6,p.y+7,12,8);
x.fillStyle='rgba(0,0,0,.35)';x.fillRect(10,10,120,18);x.fillStyle='#7dff9e';x.fillRect(10,10,Math.max(0,1.2*o2),18);
if(over){x.fillStyle='rgba(0,0,0,.65)';x.fillRect(58,205,284,110);x.fillStyle='#fff';x.font='22px monospace';x.fillText('Out of O2',140,248);x.font='14px monospace';x.fillText('Tap restart or press R',118,274)}
if(paused&&!over){x.fillStyle='rgba(0,0,0,.55)';x.fillRect(120,220,160,70);x.fillStyle='#fff';x.fillText('Paused',172,260)}}
function loop(){update(1);draw();requestAnimationFrame(loop)}
addEventListener('keydown',e=>{keys.add(e.key.toLowerCase());if(e.key==='r')restart();if(e.key==='p'){paused=!paused;pause.textContent=paused?'Resume':'Pause'}});addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));
u.onpointerdown=()=>keys.add('arrowup');d.onpointerdown=()=>keys.add('arrowdown');l.onpointerdown=()=>keys.add('arrowleft');r.onpointerdown=()=>keys.add('arrowright');
for(const b of [u,d,l,r]) b.onpointerup=()=>{keys.delete('arrowup');keys.delete('arrowdown');keys.delete('arrowleft');keys.delete('arrowright');};
pause.onclick=()=>{if(over)return;paused=!paused;pause.textContent=paused?'Resume':'Pause'};restart.onclick=restart;
submitScore(best);restart();requestAnimationFrame(loop);
</script></body></html>
