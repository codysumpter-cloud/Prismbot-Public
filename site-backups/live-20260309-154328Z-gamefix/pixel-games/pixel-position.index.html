<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pixel Position</title>
  <style>
    html,body{margin:0;background:#0a1024;color:#fff;font-family:monospace;min-height:100%}
    body{display:grid;place-items:center;padding:10px}
    .wrap{display:grid;gap:8px;justify-items:center;max-width:96vw}
    canvas{width:min(92vw,420px);height:auto;image-rendering:pixelated;border:3px solid #8aa0ff;background:#2f7be9}
    .pad{display:grid;grid-template-columns:repeat(3,64px);gap:6px;justify-content:center}
    .pad button{height:44px;background:#1b2458;color:#fff;border:1px solid #5e76ff}.row{display:flex;gap:8px;justify-content:center}.row button{padding:8px 12px;background:#1b2458;color:#fff;border:1px solid #5e76ff}
  </style>
</head>
<body>
<div class="wrap">
  <h3>Pixel Position</h3>
  <canvas id="g" width="320" height="480" aria-label="Pixel racer"></canvas>
  <div id="ui">Score 0 · Best 0</div><div class="row"><button id="pause">Pause</button><button id="restart">Restart</button></div>
  <div>Steer left/right, avoid cars. Tap to start/restart.</div>
  <div class="pad"><button></button><button id="up">ACCEL</button><button></button><button id="left">←</button><button id="down">BRAKE</button><button id="right">→</button></div>
</div>
<script>
let _lastSubmitted=0;function submitScore(score){try{score=Number(score)||0;if(score<=0||score<=_lastSubmitted)return;_lastSubmitted=score;fetch('/wp-json/prismtek/v1/scores',{method:'POST',credentials:'include',cache:'no-store',headers:{'content-type':'application/json'},body:JSON.stringify({game:'pixel-position',score,name:(localStorage.getItem('pixel_player_name')||'Guest'),playerKey:(localStorage.getItem('pixel_player_key')||'')})}).catch(()=>{});}catch{}}

const c=document.getElementById('g'),x=c.getContext('2d');
const ui=document.getElementById('ui');
const W=320,H=480;
let best=+localStorage.pixel_position_best||0;
let started=false,over=false,paused=false;
let roadX=0,playerX=0,speed=2.2,score=0,t=0;
let cars=[];
const keys={l:false,r:false,u:false,d:false};

function reset(){started=false;over=false;paused=false;roadX=0;playerX=0;speed=2.2;score=0;t=0;cars=[];updateUI(); if(window.pause) pause.textContent="Pause";}
function updateUI(){ui.textContent=`Score ${Math.floor(score)} · Best ${best}`;}

function spawnCar(){
  const lane=(Math.random()*2-1)*110;
  cars.push({x:lane,z:0,w:24,h:16,col:['#ff6b6b','#ffd166','#8ecae6'][Math.floor(Math.random()*3)]});
}

function proj(z,lx){
  // pseudo perspective
  const y = H*0.28 + (1-z)*H*0.62;
  const scale = (1-z)*1.1 + 0.08;
  const roadW = 44 + (1-z)*220;
  const xCenter = W/2 + lx*scale;
  return {y,scale,roadW,xCenter};
}

function rectHit(a,b){return a.x<a.x+a.w && b.x<b.x+b.w && a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;}

function update(){
  if(!started||over||paused) return;
  t++;
  if(keys.u) speed=Math.min(5.6,speed+0.03);
  if(keys.d) speed=Math.max(1.6,speed-0.05);
  if(!keys.u&&!keys.d) speed=Math.max(2.0, speed-0.01);

  if(keys.l) playerX-=3.2;
  if(keys.r) playerX+=3.2;
  playerX=Math.max(-130,Math.min(130,playerX));

  roadX += speed*0.9;
  score += speed*0.9;

  if(t%32===0) spawnCar();
  cars.forEach(car=>car.z += speed*0.008);
  cars = cars.filter(car=>car.z<1.05);

  // collision near bottom only
  const p={x:W/2+playerX-12,y:H-84,w:24,h:18};
  for(const car of cars){
    const pr=proj(car.z,car.x);
    const w=car.w*pr.scale*1.2,h=car.h*pr.scale*1.2;
    const r={x:pr.xCenter-w/2,y:pr.y-h/2,w,h};
    if(car.z>0.78 && p.x<r.x+r.w && p.x+p.w>r.x && p.y<r.y+r.h && p.y+p.h>r.y){
      over=true;
      if(score>best){best=Math.floor(score);localStorage.pixel_position_best=best;submitScore(best);} 
      updateUI();
      break;
    }
  }

  if(score>best){best=Math.floor(score);localStorage.pixel_position_best=best;submitScore(best);} 
  updateUI();
}

function drawRoad(){
  // sky + horizon
  x.fillStyle='#4ea0ff';x.fillRect(0,0,W,H*0.45);
  x.fillStyle='#6dcc6d';x.fillRect(0,H*0.45,W,H*0.55);

  // road segments
  for(let i=0;i<40;i++){
    const z=i/40;
    const p=proj(z,0), p2=proj((i+1)/40,0);
    const left1=p.xCenter-p.roadW/2, right1=p.xCenter+p.roadW/2;
    const left2=p2.xCenter-p2.roadW/2, right2=p2.xCenter+p2.roadW/2;
    x.fillStyle = (i%2)?'#3b3b3b':'#444';
    x.beginPath();x.moveTo(left1,p.y);x.lineTo(right1,p.y);x.lineTo(right2,p2.y);x.lineTo(left2,p2.y);x.closePath();x.fill();

    // center line dashes
    if(i%3===0){
      const cx1=(left1+right1)/2,cx2=(left2+right2)/2;
      x.strokeStyle='#fff';x.lineWidth=Math.max(1,2*(1-z));
      x.beginPath();x.moveTo(cx1,p.y);x.lineTo(cx2,p2.y);x.stroke();
    }
  }
}

function drawCars(){
  cars.slice().sort((a,b)=>a.z-b.z).forEach(car=>{
    const p=proj(car.z,car.x);
    const w=car.w*p.scale*1.2,h=car.h*p.scale*1.2;
    x.fillStyle=car.col;
    x.fillRect(p.xCenter-w/2,p.y-h/2,w,h);
    x.fillStyle='rgba(0,0,0,.25)';
    x.fillRect(p.xCenter-w/2,p.y-h/2+h*0.6,w,h*0.4);
  });
}

function drawPlayer(){
  const y=H-74;const w=32,h=20;
  const px=W/2+playerX;
  x.fillStyle='#ffd54f';x.fillRect(px-w/2,y-h/2,w,h);
  x.fillStyle='#222';x.fillRect(px-w/2+3,y+h/2-4,8,4);x.fillRect(px+w/2-11,y+h/2-4,8,4);
}

function drawOverlay(){
  if(paused&&!over){x.fillStyle='rgba(0,0,0,.55)';x.fillRect(84,214,152,64);x.fillStyle='#fff';x.fillText('Paused',138,252);} if(!started){
    x.fillStyle='rgba(0,0,0,.55)';x.fillRect(36,194,248,92);
    x.fillStyle='#fff';x.fillText('Tap to Start',116,236);x.fillText('Steer to survive',104,258);
  }
  if(over){
    x.fillStyle='rgba(0,0,0,.62)';x.fillRect(32,186,256,110);
    x.fillStyle='#fff';x.fillText('Crash!',145,226);x.fillText('Tap to Restart',112,250);x.fillText('Score '+Math.floor(score),120,272);
  }
}

function render(){x.clearRect(0,0,W,H);drawRoad();drawCars();drawPlayer();drawOverlay();}
function loop(){update();render();requestAnimationFrame(loop);}loop();

function pressStart(){if(over){reset();started=true;return;}started=true;}
addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();if(e.key==='ArrowLeft'||e.key==='a')keys.l=true;if(e.key==='ArrowRight'||e.key==='d')keys.r=true;if(e.key==='ArrowUp'||e.key==='w')keys.u=true;if(e.key==='ArrowDown'||e.key==='s')keys.d=true;if(e.key==='r')reset();if(e.key==='p'){paused=!paused; if(window.pause) pause.textContent=paused?'Resume':'Pause';}if(e.key===' '){e.preventDefault();pressStart();}});
addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key==='a')keys.l=false;if(e.key==='ArrowRight'||e.key==='d')keys.r=false;if(e.key==='ArrowUp'||e.key==='w')keys.u=false;if(e.key==='ArrowDown'||e.key==='s')keys.d=false;});
c.addEventListener('pointerdown',()=>pressStart(),{passive:true});
document.getElementById('left').onclick=()=>{keys.l=true;setTimeout(()=>keys.l=false,120)};
document.getElementById('right').onclick=()=>{keys.r=true;setTimeout(()=>keys.r=false,120)};
document.getElementById('up').onclick=()=>{keys.u=true;setTimeout(()=>keys.u=false,160)};
document.getElementById('down').onclick=()=>{keys.d=true;setTimeout(()=>keys.d=false,160)};
document.getElementById('pause').onclick=()=>{if(over)return;paused=!paused;pause.textContent=paused?'Resume':'Pause';};
document.getElementById('restart').onclick=()=>reset();
submitScore(best);reset();
</script>
</body>
</html>
