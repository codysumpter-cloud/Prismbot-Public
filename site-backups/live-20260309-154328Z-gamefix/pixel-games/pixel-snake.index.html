<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pixel Snake</title><style>body{margin:0;background:#0d1129;color:#fff;font-family:monospace;display:grid;place-items:center;min-height:100vh}canvas{image-rendering:pixelated;border:3px solid #8aa0ff;width:min(92vw,420px);height:auto}.ui{display:grid;gap:8px;text-align:center}.pad{display:grid;grid-template-columns:repeat(3,64px);gap:6px;justify-content:center}.pad button{height:46px;background:#1b2458;color:#fff;border:1px solid #5e76ff}.row{display:flex;gap:8px;justify-content:center}</style></head><body><div class="ui"><h3>Pixel Snake</h3><canvas id="c" width="320" height="320"></canvas><div class="row"><button id="pause">Pause</button><button id="reset">Restart</button></div><div>Swipe or arrows · R restart</div><div class="pad"><button></button><button id="u">↑</button><button></button><button id="l">←</button><button id="d">↓</button><button id="r">→</button></div></div><script>
let _last=0;function submitScore(s){try{s=+s||0;if(s<=0||s<=_last)return;_last=s;fetch('/wp-json/prismtek/v1/scores',{method:'POST',credentials:'include',cache:'no-store',headers:{'content-type':'application/json'},body:JSON.stringify({game:'pixel-snake',score:s,name:(localStorage.getItem('pixel_player_name')||'Guest'),playerKey:(localStorage.getItem('pixel_player_key')||'')})})}catch{}}
const x=c.getContext('2d'),S=20;let dir=[1,0],next=[1,0],snake=[[8,8]],food=[12,10],alive=true,score=0,best=+localStorage.snake_best||0,paused=false,fx=[];
function rnd(){return [Math.floor(Math.random()*S),Math.floor(Math.random()*S)]}
function spawn(){do{food=rnd()}while(snake.some(p=>p[0]==food[0]&&p[1]==food[1]))}
function restart(){dir=[1,0];next=[1,0];snake=[[8,8]];spawn();alive=true;score=0;paused=false;pause.textContent='Pause';fx=[]}
function setd(a,b){if(dir[0]===-a&&dir[1]===-b)return;next=[a,b]}
function tick(){if(!alive||paused)return;dir=next;let h=[snake[0][0]+dir[0],snake[0][1]+dir[1]];if(h[0]<0||h[1]<0||h[0]>=S||h[1]>=S||snake.some(p=>p[0]==h[0]&&p[1]==h[1])){alive=false;return}snake.unshift(h);if(h[0]==food[0]&&h[1]==food[1]){score++;fx.push({x:h[0],y:h[1],t:12});if(score>best){best=score;localStorage.snake_best=best;submitScore(best)}spawn()}else snake.pop();fx=fx.map(f=>({...f,t:f.t-1})).filter(f=>f.t>0)}
function draw(){x.fillStyle='#09122f';x.fillRect(0,0,320,320);x.strokeStyle='rgba(255,255,255,.08)';for(let i=1;i<S;i++){x.beginPath();x.moveTo(i*16,0);x.lineTo(i*16,320);x.stroke();x.beginPath();x.moveTo(0,i*16);x.lineTo(320,i*16);x.stroke()}x.fillStyle='#ff5f7e';x.fillRect(food[0]*16+2,food[1]*16+2,12,12);snake.forEach((p,i)=>{x.fillStyle=i?'#63d476':'#b5ff7f';x.fillRect(p[0]*16+2,p[1]*16+2,12,12)});fx.forEach(f=>{x.fillStyle='rgba(255,255,255,'+(f.t/12)+')';x.fillRect(f.x*16+6,f.y*16+6,4,4)});x.fillStyle='#fff';x.fillText('Score '+score+'  Best '+best,8,14);if(paused&&alive){x.fillStyle='rgba(0,0,0,.5)';x.fillRect(78,128,164,58);x.fillStyle='#fff';x.fillText('Paused',136,162)}if(!alive){x.fillStyle='rgba(0,0,0,.6)';x.fillRect(36,124,248,72);x.fillStyle='#fff';x.fillText('Game Over - Press R',92,162)}}
addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();if(e.key==='w'||e.key==='ArrowUp')setd(0,-1);if(e.key==='s'||e.key==='ArrowDown')setd(0,1);if(e.key==='a'||e.key==='ArrowLeft')setd(-1,0);if(e.key==='d'||e.key==='ArrowRight')setd(1,0);if(e.key==='r')restart();if(e.key==='p'){paused=!paused;pause.textContent=paused?'Resume':'Pause'}});
[['u',0,-1],['d',0,1],['l',-1,0],['r',1,0]].forEach(([id,a,b])=>document.getElementById(id).onclick=()=>setd(a,b));
pause.onclick=()=>{if(!alive)return;paused=!paused;pause.textContent=paused?'Resume':'Pause'};reset.onclick=()=>restart();
let ts=null;c.addEventListener('pointerdown',e=>{ts={x:e.clientX,y:e.clientY}});c.addEventListener('pointerup',e=>{if(!ts)return;const dx=e.clientX-ts.x,dy=e.clientY-ts.y;ts=null;if(Math.abs(dx)<10&&Math.abs(dy)<10)return;if(Math.abs(dx)>Math.abs(dy))setd(dx>0?1:-1,0);else setd(0,dy>0?1:-1)});
setInterval(()=>{tick();draw()},105);submitScore(best);restart();
</script></body></html>
