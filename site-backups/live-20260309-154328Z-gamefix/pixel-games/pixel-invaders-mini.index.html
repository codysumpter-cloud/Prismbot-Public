<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pixel Invaders Mini</title>
  <style>
    body{margin:0;background:#070b1f;color:#fff;font-family:monospace;display:grid;place-items:center;min-height:100vh}
    .wrap{display:grid;gap:8px;justify-items:center;padding:10px;max-width:96vw}
    canvas{image-rendering:pixelated;border:3px solid #8aa0ff;width:min(92vw,420px);height:auto}
    .controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    .controls button{height:44px;min-width:72px;background:#1b2458;color:#fff;border:1px solid #5e76ff}
  </style>
</head>
<body>
<div class="wrap">
  <h3>Pixel Invaders Mini</h3>
  <canvas id="c" width="360" height="520"></canvas>
  <div id="ui">Lives 3 · Wave 1 · Score 0 · Best 0</div>
  <div class="controls"><button id="l">←</button><button id="f">FIRE</button><button id="r">→</button><button id="pause">PAUSE</button><button id="rs">RESTART</button></div>
  <div>A/D or arrows to move · Space fire</div>
</div>
<script>
let _lastSubmitted=0;
function submitScore(score){
  try{
    score=Number(score)||0;
    if(score<=0||score<=_lastSubmitted)return;
    _lastSubmitted=score;
    fetch('/wp-json/prismtek/v1/scores',{
      method:'POST',credentials:'include',cache:'no-store',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({game:'pixel-invaders-mini',score,name:(localStorage.getItem('pixel_player_name')||'Guest'),playerKey:(localStorage.getItem('pixel_player_key')||'')})
    }).catch(()=>{});
  }catch{}
}

const c=document.getElementById('c'),x=c.getContext('2d');
const ui=document.getElementById('ui');
const W=360,H=520;
let best=+localStorage.pixel_invaders_best||0;
let p,bul,eb,inv,dir,t,score,lives,wave,over,paused,cooldown,shields,stars,particles,hurt,shake;

function rand(a,b){return a+Math.random()*(b-a)}
function hit(a,b){return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y}
function boom(x0,y0,col='#ffd166'){for(let i=0;i<10;i++)particles.push({x:x0,y:y0,vx:rand(-2.2,2.2),vy:rand(-2.2,2.2),t:20,col});}

function makeInvaders(){
  inv=[];
  const rows=4+Math.min(2,wave-1), cols=8;
  for(let r=0;r<rows;r++)for(let i=0;i<cols;i++)inv.push({x:28+i*38,y:44+r*30,alive:true,type:r%3});
}
function makeShields(){
  shields=[];
  const bases=[56,150,244];
  for(const bx of bases){
    for(let yy=0;yy<4;yy++) for(let xx=0;xx<10;xx++){
      // more holes so enemy bullets can reach player sometimes
      if((yy===0&&(xx<2||xx>7)) || (yy===3&&(xx===4||xx===5)) || (yy===1&&(xx===0||xx===9))) continue;
      shields.push({x:bx+xx*4,y:404+yy*4,hp:2});
    }
  }
}
function restart(){
  p={x:170,y:476,w:24,h:12};
  bul=[];eb=[];score=0;lives=3;wave=1;over=false;paused=false;dir=1;t=0;cooldown=0;hurt=0;shake=0;
  particles=[];
  stars=Array.from({length:40},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.8+0.4}));
  makeInvaders();makeShields();syncUI();
}
function nextWave(){wave++;dir=1;t=0;bul=[];eb=[];makeInvaders();makeShields();syncUI();}
function syncUI(){ui.textContent=`Lives ${lives} · Wave ${wave} · Score ${score} · Best ${best}`;}

function fire(){
  if(over)return;
  if(cooldown>0)return;
  bul.push({x:p.x+p.w/2-1,y:p.y-7,v:-7,w:2,h:8});
  cooldown=7;
}

const keys={l:false,r:false};
addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();if(e.key==='a'||e.key==='ArrowLeft')keys.l=true;if(e.key==='d'||e.key==='ArrowRight')keys.r=true;if(e.key===' '){e.preventDefault();fire()}if(e.key==='r')restart();if(e.key==='p'){paused=!paused; if(window.pause) pause.textContent=paused?'RESUME':'PAUSE';}});
addEventListener('keyup',e=>{if(e.key==='a'||e.key==='ArrowLeft')keys.l=false;if(e.key==='d'||e.key==='ArrowRight')keys.r=false;});

function loseLife(){
  if(hurt>0||over) return;
  lives--; hurt=50; shake=10;
  boom(p.x+p.w/2,p.y+4,'#ff7d7d');
  if(lives<=0){over=true;submitScore(best);} 
  syncUI();
}

function step(){
  if(!p || paused) return;
  t++;
  if(cooldown>0) cooldown--;
  if(hurt>0) hurt--;
  if(shake>0) shake--;

  if(!over){
    if(keys.l) p.x-=4.2;
    if(keys.r) p.x+=4.2;
    p.x=Math.max(6,Math.min(330,p.x));

    const moveEvery=Math.max(7,18-wave);
    if(t%moveEvery===0){
      const edge=inv.some(i=>i.alive&&(i.x>332||i.x<10));
      if(edge){dir*=-1;inv.forEach(i=>{if(i.alive)i.y+=10;});}
      inv.forEach(i=>{if(i.alive)i.x+=dir*(6+wave*0.38);});
    }

    if(t%Math.max(18,36-wave*2)===0){
      const alive=inv.filter(i=>i.alive);
      if(alive.length){
        const s=alive[Math.floor(Math.random()*alive.length)];
        eb.push({x:s.x+8,y:s.y+10,v:3.2+wave*0.26,w:3,h:8});
      }
    }

    bul=bul.map(b=>({...b,y:b.y+b.v})).filter(b=>b.y>-14);
    eb=eb.map(b=>({...b,y:b.y+b.v})).filter(b=>b.y<H+20);

    // bullets vs invaders
    for(const b of bul){
      for(const i of inv){
        if(!i.alive) continue;
        const ir={x:i.x,y:i.y,w:18,h:14};
        if(hit(b,ir)){
          i.alive=false; b.y=-999;
          score += 10 + i.type*4;
          boom(i.x+9,i.y+7,['#7ef','#f7c','#ffb347'][i.type]);
          if(score>best){best=score;localStorage.pixel_invaders_best=best;submitScore(best);}          
          break;
        }
      }
    }

    // bullets vs shields
    const damageShield=(proj)=>{
      for(const s of shields){
        const sr={x:s.x,y:s.y,w:4,h:4};
        if(hit(proj,sr)){ s.hp--; proj.y=9999; return true; }
      }
      return false;
    };
    bul.forEach(b=>damageShield(b));
    eb.forEach(b=>damageShield(b));
    shields=shields.filter(s=>s.hp>0);

    // enemy bullets vs player
    const pr={x:p.x,y:p.y,w:p.w,h:p.h};
    for(const b of eb){
      if(hit(b,pr)){ b.y=9999; loseLife(); }
    }

    // invader contact / breach
    for(const i of inv){
      if(!i.alive) continue;
      if(i.y>442) loseLife();
      if(hit({x:i.x,y:i.y,w:18,h:14},pr)) loseLife();
    }

    if(inv.every(i=>!i.alive)) nextWave();
  }

  particles=particles.map(p=>({x:p.x+p.vx,y:p.y+p.vy,vx:p.vx*0.98,vy:p.vy*0.98,t:p.t-1,col:p.col})).filter(p=>p.t>0);
  stars.forEach(s=>{s.y+=0.35+s.s*0.25;if(s.y>H){s.y=0;s.x=Math.random()*W}});
  syncUI();
}

function drawInv(i){
  x.fillStyle=['#7ef','#f7c','#ffb347'][i.type];x.fillRect(i.x,i.y,18,14);
  x.fillStyle='rgba(0,0,0,.25)';x.fillRect(i.x+3,i.y+9,12,5);
}

function draw(){
  const ox = shake>0 ? (Math.random()*4-2) : 0;
  const oy = shake>0 ? (Math.random()*4-2) : 0;
  x.save(); x.translate(ox,oy);
  x.fillStyle='#070b1f';x.fillRect(0,0,W,H);
  stars.forEach(s=>{x.fillStyle='rgba(210,230,255,.8)';x.fillRect(s.x,s.y,s.s,s.s);});
  x.fillStyle='rgba(255,255,255,.15)';for(let i=0;i<18;i++)x.fillRect(179,i*30+8,2,14);

  shields.forEach(s=>{x.fillStyle=s.hp===2?'#7bd77b':'#4f9f4f';x.fillRect(s.x,s.y,4,4);});
  inv.forEach(i=>{if(i.alive)drawInv(i);});

  x.fillStyle='#ffd166';bul.forEach(b=>x.fillRect(b.x,b.y,b.w,b.h));
  x.fillStyle='#ff6b6b';eb.forEach(b=>x.fillRect(b.x,b.y,b.w,b.h));

  if(hurt%6<3){
    x.fillStyle='#9ad1ff';x.fillRect(p.x,p.y,p.w,p.h);
    x.fillStyle='#d9f0ff';x.fillRect(p.x+8,p.y-4,8,4);
  }

  particles.forEach(pp=>{x.fillStyle=pp.col;x.fillRect(pp.x,pp.y,2,2);});

  if(paused&&!over){x.fillStyle='rgba(0,0,0,.55)';x.fillRect(86,220,188,76);x.fillStyle='#fff';x.fillText('Paused',150,262);} if(over){x.fillStyle='rgba(0,0,0,.65)';x.fillRect(58,220,244,88);x.fillStyle='#fff';x.fillText('Game Over',144,258);x.fillText('Tap RESTART',132,280);}  
  x.restore();
}

function loop(){step();draw();requestAnimationFrame(loop)}

document.getElementById('l').onclick=()=>{keys.l=true;setTimeout(()=>keys.l=false,120)};
document.getElementById('r').onclick=()=>{keys.r=true;setTimeout(()=>keys.r=false,120)};
document.getElementById('f').onclick=fire;
document.getElementById('pause').onclick=()=>{if(over)return;paused=!paused;pause.textContent=paused?'RESUME':'PAUSE';};
document.getElementById('rs').onclick=restart;
submitScore(best);
restart();
loop();
</script>
</body>
</html>
