<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pixel Pong</title><style>body{margin:0;background:#0a1128;color:#fff;font-family:monospace;display:grid;place-items:center;min-height:100vh}.wrap{display:grid;gap:8px;justify-items:center;padding:10px;max-width:96vw}canvas{width:min(92vw,420px);height:auto;image-rendering:pixelated;border:3px solid #8aa0ff;background:#0f183a}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}button{background:#1b2458;color:#fff;border:1px solid #5e76ff;padding:8px 12px}.pad{display:flex;gap:8px}</style></head><body><div class="wrap"><h3>Pixel Pong</h3><canvas id="g" width="320" height="480"></canvas><div id="ui">You 0 · CPU 0 · Best Streak 0</div><div class="row"><button id="pause">Pause</button><button id="restart">Restart</button><span>W/S or ↑/↓ · Tap Up/Down</span></div><div class="pad"><button id="up">Up</button><button id="down">Down</button></div></div><script>
let _last=0;function submitScore(s){try{s=+s||0;if(s<=0||s<=_last)return;_last=s;fetch('/wp-json/prismtek/v1/scores',{method:'POST',credentials:'include',cache:'no-store',headers:{'content-type':'application/json'},body:JSON.stringify({game:'pixel-pong',score:s,name:(localStorage.getItem('pixel_player_name')||'Guest'),playerKey:(localStorage.getItem('pixel_player_key')||'')})})}catch{}}
const x=g.getContext('2d');let best=+localStorage.pixel_pong_best||0;let you=0,cpu=0,streak=0,paused=false;let p1={x:16,y:200,w:8,h:62},p2={x:296,y:200,w:8,h:62},b={x:160,y:240,vx:3.2,vy:2.1,r:5},started=false,fx=[];
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function rb(d=1){b={x:160,y:240,vx:(2.9+Math.random()*1.2)*d,vy:(Math.random()*4-2),r:5}}
function restartGame(){you=0;cpu=0;streak=0;started=false;paused=false;p1.y=200;p2.y=200;fx=[];pause.textContent='Pause';rb(Math.random()>0.5?1:-1);uiT()}
function uiT(){ui.textContent=`You ${you} · CPU ${cpu} · Best Streak ${best}`}
function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
const keys={u:false,d:false};
function step(dt){if(!started||paused)return;let sp=4.2*dt;if(keys.u)p1.y-=sp;if(keys.d)p1.y+=sp;p1.y=clamp(p1.y,8,480-p1.h-8);let target=b.y-p2.h/2;p2.y+=clamp(target-p2.y,-3.2*dt,3.2*dt);p2.y=clamp(p2.y,8,480-p2.h-8);b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.y-b.r<8||b.y+b.r>480-8){b.vy*=-1;b.y=clamp(b.y,8+b.r,480-8-b.r);fx.push({x:b.x,y:b.y,t:10})}
if(hit({x:b.x-b.r,y:b.y-b.r,w:b.r*2,h:b.r*2},{x:p1.x,y:p1.y,w:p1.w,h:p1.h})&&b.vx<0){b.vx=Math.abs(b.vx)+.2;const rel=(b.y-(p1.y+p1.h/2))/(p1.h/2);b.vy+=rel*1.2;streak++;if(streak>best){best=streak;localStorage.pixel_pong_best=best;submitScore(best)}fx.push({x:p1.x+8,y:b.y,t:12});uiT()}
if(hit({x:b.x-b.r,y:b.y-b.r,w:b.r*2,h:b.r*2},{x:p2.x,y:p2.y,w:p2.w,h:p2.h})&&b.vx>0){b.vx=-(Math.abs(b.vx)+.15);const rel=(b.y-(p2.y+p2.h/2))/(p2.h/2);b.vy+=rel*1.1;fx.push({x:p2.x,y:b.y,t:12})}
if(b.x<-20){cpu++;streak=0;rb(1);uiT()}if(b.x>340){you++;rb(-1);uiT()}fx=fx.map(f=>({...f,t:f.t-1*dt})).filter(f=>f.t>0)}
function draw(){x.fillStyle='#0f183a';x.fillRect(0,0,320,480);x.fillStyle='rgba(255,255,255,.2)';for(let i=0;i<16;i++)x.fillRect(159,i*32+8,2,16);x.fillStyle='#9ad1ff';x.fillRect(p1.x,p1.y,p1.w,p1.h);x.fillRect(p2.x,p2.y,p2.w,p2.h);x.fillStyle='#ffd166';x.beginPath();x.arc(b.x,b.y,b.r,0,7);x.fill();fx.forEach(f=>{x.fillStyle='rgba(255,255,255,'+(f.t/12)+')';x.fillRect(f.x-1,f.y-1,3,3)});if(!started){x.fillStyle='rgba(0,0,0,.55)';x.fillRect(42,198,236,84);x.fillStyle='#fff';x.fillText('Tap to Start',118,238)}if(paused&&started){x.fillStyle='rgba(0,0,0,.5)';x.fillRect(108,216,104,46);x.fillStyle='#fff';x.fillText('Paused',136,244)}}
let last=0;function loop(ts){if(!last)last=ts;let dt=(ts-last)/16.6667;last=ts;dt=Math.max(.5,Math.min(2,dt));step(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);
addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();if(e.key==='w'||e.key==='ArrowUp')keys.u=true;if(e.key==='s'||e.key==='ArrowDown')keys.d=true;if(e.key===' '){e.preventDefault();started=true;}if(e.key==='p'){paused=!paused;pause.textContent=paused?'Resume':'Pause'}if(e.key==='r')restartGame()});
addEventListener('keyup',e=>{if(e.key==='w'||e.key==='ArrowUp')keys.u=false;if(e.key==='s'||e.key==='ArrowDown')keys.d=false});
g.addEventListener('pointerdown',()=>{started=true});up.onclick=()=>{keys.u=true;setTimeout(()=>keys.u=false,120)};down.onclick=()=>{keys.d=true;setTimeout(()=>keys.d=false,120)};pause.onclick=()=>{if(!started)return;paused=!paused;pause.textContent=paused?'Resume':'Pause'};restart.onclick=()=>restartGame();submitScore(best);restartGame();
</script></body></html>
