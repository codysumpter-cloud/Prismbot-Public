<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Flappy Pixel</title>
<style>
body{margin:0;background:#0b1024;color:#fff;font-family:monospace;display:grid;place-items:center;min-height:100vh;overflow:hidden}
.wrap{text-align:center;width:min(94vw,420px)}
.game{width:100%;aspect-ratio:9/16;max-height:82vh;margin:auto}
canvas{width:100%;height:100%;display:block;border:3px solid #8aa0ff;image-rendering:pixelated}
.row{display:flex;gap:8px;justify-content:center;margin-top:8px}.row button{padding:8px 12px;background:#1b2458;color:#fff;border:1px solid #5e76ff}
</style></head><body><div class="wrap"><h3>Flappy Pixel</h3><div class="game"><canvas id="g" width="360" height="640"></canvas></div><div class="row"><button id="pause">Pause</button><button id="restart">Restart</button></div><div>Tap/Space to flap · Tap when over to restart</div></div>
<script>
let _last=0;function submitScore(s){try{s=+s||0;if(s<=0||s<=_last)return;_last=s;fetch('/wp-json/prismtek/v1/scores',{method:'POST',credentials:'include',cache:'no-store',headers:{'content-type':'application/json'},body:JSON.stringify({game:'flappy-pixel',score:s,name:(localStorage.getItem('pixel_player_name')||'Guest'),playerKey:(localStorage.getItem('pixel_player_key')||'')})})}catch{}}
const c=g,x=c.getContext('2d');
const G={w:360,h:640,gravity:.38,flap:-6.7,speed:2.4,gap:165,pipeW:58,t:0,score:0,best:+localStorage.flappy_best||0,start:false,over:false,pause:false,b:{x:88,y:260,vy:0,r:13},pipes:[],fx:[],spawnTimer:0};
function reset(){G.t=0;G.score=0;G.start=false;G.over=false;G.pause=false;G.spawnTimer=0;G.b={x:88,y:260,vy:0,r:13};G.pipes=[];G.fx=[];pause.textContent='Pause'}
function spawn(){const min=70,max=G.h-G.gap-150;const top=Math.floor(min+Math.random()*(max-min));G.pipes.push({x:G.w+12,top,passed:false})}
function hitRect(rx,ry,rw,rh,cx,cy,cr){const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));const dx=cx-nx,dy=cy-ny;return dx*dx+dy*dy<cr*cr}
function flap(){if(G.pause)return;if(G.over){reset();G.start=true;return;}G.start=true;G.b.vy=G.flap}
function update(dt){
  if(!G.start||G.over||G.pause) return;
  G.t += dt;
  G.spawnTimer += dt;
  while(G.spawnTimer >= 92){spawn();G.spawnTimer -= 92}

  G.b.vy += G.gravity*dt;
  G.b.y += G.b.vy*dt;

  for(const p of G.pipes){
    p.x -= G.speed*dt;
    if(!p.passed&&p.x+G.pipeW<G.b.x){
      p.passed=true;G.score++;G.fx.push({x:G.b.x,y:G.b.y,t:20});
      if(G.score>G.best){G.best=G.score;localStorage.flappy_best=G.best;submitScore(G.best)}
    }
    const by=p.top+G.gap;
    if(hitRect(p.x,0,G.pipeW,p.top,G.b.x,G.b.y,G.b.r)||hitRect(p.x,by,G.pipeW,G.h-by,G.b.x,G.b.y,G.b.r)) G.over=true;
  }
  G.pipes=G.pipes.filter(p=>p.x+G.pipeW>-20);
  if(G.b.y-G.b.r<0||G.b.y+G.b.r>G.h-2) G.over=true;
  G.fx=G.fx.map(f=>({...f,t:f.t-dt})).filter(f=>f.t>0)
}
function draw(){x.clearRect(0,0,G.w,G.h);x.fillStyle='#79b6ff';x.fillRect(0,0,G.w,G.h);x.fillStyle='rgba(255,255,255,.85)';for(let i=0;i<4;i++){const cx=(G.t*.4+i*130)%(G.w+120)-60,cy=80+(i%2)*42;x.fillRect(cx,cy,44,14);x.fillRect(cx+10,cy-8,26,8)}x.fillStyle='#8cd37e';x.fillRect(0,G.h-120,G.w,120);
for(const p of G.pipes){x.fillStyle='#2c7f3b';x.fillRect(p.x,0,G.pipeW,p.top);x.fillRect(p.x,p.top+G.gap,G.pipeW,G.h-(p.top+G.gap));x.fillStyle='#49b85a';x.fillRect(p.x+4,4,G.pipeW-8,Math.max(0,p.top-8));x.fillRect(p.x+4,p.top+G.gap+4,G.pipeW-8,Math.max(0,G.h-(p.top+G.gap)-8))}
const b=G.b;x.fillStyle='#ffe66b';x.beginPath();x.arc(b.x,b.y,b.r,0,7);x.fill();x.fillStyle='#ff9c40';x.fillRect(b.x+9,b.y-3,10,6);x.fillStyle='#1a1a1a';x.fillRect(b.x+3,b.y-5,3,3);x.fillStyle='#f2c63f';x.fillRect(b.x-8,b.y+1,10,6);
G.fx.forEach(f=>{x.fillStyle='rgba(255,255,255,'+(f.t/20)+')';x.fillText('+1',f.x+8,f.y-10-(20-f.t));});
x.fillStyle='rgba(0,0,0,.35)';x.fillRect(8,8,170,56);x.fillStyle='#fff';x.font='bold 22px monospace';x.fillText('Score: '+G.score,16,32);x.font='16px monospace';x.fillText('Best: '+G.best,16,52);
if(!G.start){x.fillStyle='rgba(0,0,0,.55)';x.fillRect(24,260,G.w-48,96);x.fillStyle='#fff';x.font='bold 22px monospace';x.fillText('Tap to Start',98,315)}
if(G.pause&&!G.over){x.fillStyle='rgba(0,0,0,.55)';x.fillRect(56,270,G.w-112,72);x.fillStyle='#fff';x.fillText('Paused',145,312)}
if(G.over){x.fillStyle='rgba(0,0,0,.65)';x.fillRect(24,248,G.w-48,126);x.fillStyle='#ffdddd';x.font='bold 28px monospace';x.fillText('Game Over',90,298);x.fillStyle='#fff';x.font='16px monospace';x.fillText('Tap to restart',112,332)} }
let _rafLast=0;
function loop(ts){
  if(!_rafLast) _rafLast=ts;
  let dt=(ts-_rafLast)/16.6667;
  _rafLast=ts;
  dt=Math.max(0.55,Math.min(2.2,dt));
  update(dt);draw();requestAnimationFrame(loop)
}
function trig(e){if(e.type==='keydown'&&e.code==='KeyR'){reset();return;}if(e.type==='keydown'&&e.code==='KeyP'){G.pause=!G.pause;pause.textContent=G.pause?'Resume':'Pause';return;}if(e.type==='keydown'&&e.code!=='Space')return;e.preventDefault();flap()}
addEventListener('keydown',trig,{passive:false});g.addEventListener('pointerdown',trig,{passive:false});
pause.onclick=()=>{if(G.over)return;G.pause=!G.pause;pause.textContent=G.pause?'Resume':'Pause'};restart.onclick=()=>reset();submitScore(G.best);reset();requestAnimationFrame(loop);
</script></body></html>
