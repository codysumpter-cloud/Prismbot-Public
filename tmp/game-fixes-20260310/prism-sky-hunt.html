<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prism Sky Hunt</title>
  <style>
    body{margin:0;background:#0b122d;color:#fff;font-family:monospace;display:grid;place-items:center;min-height:100vh}
    .wrap{display:grid;gap:8px;justify-items:center;padding:10px;max-width:96vw}
    canvas{width:min(92vw,480px);height:auto;image-rendering:pixelated;border:3px solid #8aa0ff;background:#5cb7ff;cursor:crosshair}
    .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    button{background:#1b2458;color:#fff;border:1px solid #5e76ff;padding:8px 12px}
  </style>
</head>
<body>
<div class="wrap">
  <h3>Prism Sky Hunt</h3>
  <canvas id="g" width="400" height="520"></canvas>
  <div id="ui">Score 0 · Round 1 · Ammo 6 · Best 0</div>
  <div class="row"><button id="pause">Pause</button><button id="restart">Restart</button><span>Tap/click ducks to shoot • R to restart</span></div>
</div>
<script>
let _lastSubmitted=0;function submitScore(score){try{score=Number(score)||0;if(score<=0||score<=_lastSubmitted)return;_lastSubmitted=score;fetch('/wp-json/prismtek/v1/scores',{method:'POST',credentials:'include',cache:'no-store',headers:{'content-type':'application/json'},body:JSON.stringify({game:'prism-sky-hunt',score,name:(localStorage.getItem('pixel_player_name')||'Guest'),playerKey:(localStorage.getItem('pixel_player_key')||'')})}).catch(()=>{});}catch{}}
const c=document.getElementById('g'),x=c.getContext('2d');
const ui=document.getElementById('ui');
const W=400,H=520;
let best=+localStorage.prism_sky_hunt_best||0;
let score=0,round=1,ammo=6,shots=0,hits=0,over=false,paused=false,t=0,roundPending=false;
let ducks=[],particles=[],dogs=[];
let combo=0,lastHitTick=0;
let retrieval=0,retrievalTarget=0;

function rand(a,b){return a+Math.random()*(b-a)}
function resetRound(){ammo=6;shots=0;hits=0;ducks=[];roundPending=false;spawnDucks(Math.min(2+Math.floor(round/2),5));}
function restart(){score=0;round=1;over=false;paused=false;roundPending=false;ducks=[];particles=[];dogs=[];resetRound();syncUI(); if(window.pause) pause.textContent="Pause";}
function syncUI(){ui.textContent=`Score ${score} · Round ${round} · Ammo ${ammo} · Combo x${Math.max(1,combo)} · Best ${best}`;}

function spawnBonusDuck(){
  const dir=Math.random()>0.5?1:-1;
  const y=rand(90,210);
  ducks.push({x:dir>0?-36:W+36,y,vx:dir*rand(2.4,3.2),vy:rand(-0.35,0.35),w:22,h:14,alive:true,escape:false,phase:Math.random()*6,bonus:true});
}

function spawnDucks(n){
  for(let i=0;i<n;i++){
    const dir=Math.random()>0.5?1:-1;
    const y=rand(120,340);
    ducks.push({x:dir>0?-30:W+30,y,vx:dir*rand(1.2,2.2+round*0.15),vy:rand(-0.45,0.45),w:26,h:18,alive:true,escape:false,phase:Math.random()*6});
  }
}

function boom(x0,y0,col='#ffe066'){for(let i=0;i<12;i++)particles.push({x:x0,y:y0,vx:rand(-2.4,2.4),vy:rand(-2.4,2.4),t:20,col});}

function shoot(mx,my){
  if(over||ammo<=0) return;
  ammo--; shots++;
  let got=false;
  for(const d of ducks){
    if(!d.alive) continue;
    if(mx>d.x&&mx<d.x+d.w&&my>d.y&&my<d.y+d.h){
      d.alive=false; got=true; hits++;
      const base = d.bonus ? 350 : (100 + Math.max(0,Math.floor((2.5-Math.abs(d.vx))*40)));
      const now=t;
      if(now-lastHitTick<42) combo++; else combo=1;
      lastHitTick=now;
      const mult = Math.min(4, combo);
      const pts = base * mult;
      score += pts;
      if(mult>=2) dogs.push({t:55,text:'Combo x'+mult+'!'});
      retrievalTarget += 1; retrieval = 120;
      if(score>best){best=score;localStorage.prism_sky_hunt_best=best;submitScore(best);}      
      boom(mx,my,d.bonus?'#ff8fd1':'#ffd166');
      // chain bonus duck chance
      if(!d.bonus && Math.random()<0.28) spawnBonusDuck();
      break;
    }
  }
  if(!got){ combo=0; boom(mx,my,'#ffffff'); }
  syncUI();
}

function nextRoundOrGameOver(){
  if(roundPending || over) return;
  roundPending = true;
  if(hits>=Math.ceil((2+Math.floor(round/2))*0.5)){
    round++;
    dogs.push({t:120,text:'Nice Shot!'});
    retrieval = Math.max(retrieval, 90);
    setTimeout(()=>{ if(!over) resetRound(); }, 380);
  } else {
    over=true;
    dogs.push({t:240,text:'Game Over!'});
  }
  syncUI();
}

function update(){
  if(paused&&!over){x.fillStyle='rgba(0,0,0,.55)';x.fillRect(120,214,160,68);x.fillStyle='#fff';x.fillText('Paused',172,252);} if(over||paused){
    particles=particles.map(p=>({x:p.x+p.vx,y:p.y+p.vy,vx:p.vx*0.98,vy:p.vy*0.98,t:p.t-1,col:p.col})).filter(p=>p.t>0);
    dogs=dogs.map(d=>({t:d.t-1,text:d.text})).filter(d=>d.t>0);
    if(retrieval>0) retrieval--;
    return;
  }
  t++;
  ducks.forEach(d=>{
    if(!d.alive){d.y+=2.2; return;}
    d.phase += 0.2;
    d.x += d.vx;
    d.y += d.vy + Math.sin(d.phase)*0.4;
    if(d.y<60||d.y>370) d.vy*=-1;
    if((d.vx>0&&d.x>W+40)||(d.vx<0&&d.x<-40)){d.alive=false; d.escape=true;}
  });

  particles=particles.map(p=>({x:p.x+p.vx,y:p.y+p.vy,vx:p.vx*0.98,vy:p.vy*0.98,t:p.t-1,col:p.col})).filter(p=>p.t>0);
  dogs=dogs.map(d=>({t:d.t-1,text:d.text})).filter(d=>d.t>0);

  const active=ducks.some(d=>d.alive);
  if((!active || ammo<=0) && !roundPending){
    nextRoundOrGameOver();
  }
}

function drawDuck(d){
  const flap = Math.sin(d.phase)>0?1:0;
  const body = d.bonus ? '#ff9ad5' : '#ffd166';
  x.fillStyle=body;x.fillRect(d.x,d.y,d.w?d.w-8:18,d.h?d.h-6:12);
  x.fillStyle='#ff9f1c';x.fillRect(d.x+(d.w?d.w-9:17),d.y+4,8,4);
  x.fillStyle='#1f1f1f';x.fillRect(d.x+12,d.y+3,2,2);
  x.fillStyle='#7ac943';x.fillRect(d.x+4,d.y+10,4,4);
  x.fillStyle=d.bonus?'#ffc4e9':'#f7c59f';x.fillRect(d.x+5,d.y-(flap?4:1),10,4);
}

function draw(){
  x.fillStyle='#64c5ff';x.fillRect(0,0,W,H);
  // clouds
  x.fillStyle='rgba(255,255,255,.8)';
  for(let i=0;i<4;i++){const cx=(t*0.35+i*120)%(W+80)-40,cy=80+(i%2)*36;x.fillRect(cx,cy,40,12);x.fillRect(cx+8,cy-7,24,7)}
  // grass
  x.fillStyle='#6dbc56';x.fillRect(0,410,W,110);
  x.fillStyle='#579d45';for(let i=0;i<40;i++)x.fillRect(i*10,410+Math.sin((i+t*0.05))*2,6,110);

  ducks.forEach(d=>{ if(d.alive||d.y<H) drawDuck(d); });

  // crosshair
  if(lastMouse){
    x.strokeStyle='rgba(255,255,255,.75)';
    x.beginPath();x.moveTo(lastMouse.x-8,lastMouse.y);x.lineTo(lastMouse.x+8,lastMouse.y);x.stroke();
    x.beginPath();x.moveTo(lastMouse.x,lastMouse.y-8);x.lineTo(lastMouse.x,lastMouse.y+8);x.stroke();
  }

  particles.forEach(p=>{x.fillStyle=p.col;x.fillRect(p.x,p.y,2,2)});

  // ammo bar
  x.fillStyle='rgba(0,0,0,.35)';x.fillRect(10,10,110,24);
  for(let i=0;i<6;i++){x.fillStyle=i<ammo?'#ffd166':'#6b6b6b';x.fillRect(14+i*16,14,10,16)}

  if(paused&&!over){x.fillStyle='rgba(0,0,0,.55)';x.fillRect(120,214,160,68);x.fillStyle='#fff';x.fillText('Paused',172,252);} if(over){
    x.fillStyle='rgba(0,0,0,.6)';x.fillRect(60,200,280,110);
    x.fillStyle='#fff';x.font='20px monospace';x.fillText('Game Over',145,245);
    x.font='14px monospace';x.fillText('Press Restart or R',128,272);
  }

  // dog retrieval animation
  if(retrieval>0){
    const p = 1 - (retrieval/120);
    const dx = 24 + p*120;
    const dy = 426 - Math.sin(p*Math.PI)*18;
    x.fillStyle='#9b6b3f';x.fillRect(dx,dy,20,12);
    x.fillStyle='#6f4526';x.fillRect(dx+3,dy+8,14,4);
    x.fillStyle='#2b1a12';x.fillRect(dx+14,dy+2,3,3);
    for(let i=0;i<retrievalTarget;i++){x.fillStyle='#ffd166';x.fillRect(dx+22+i*6,dy+2,4,4);}
  }

  dogs.forEach(d=>{x.fillStyle='rgba(0,0,0,.5)';x.fillRect(128,360,145,34);x.fillStyle='#fff';x.fillText(d.text,146,382);});
}

let lastMouse=null;
c.addEventListener('pointermove',e=>{const r=c.getBoundingClientRect();lastMouse={x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)}});
c.addEventListener('pointerdown',e=>{const r=c.getBoundingClientRect();const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);lastMouse={x:mx,y:my};shoot(mx,my)});
addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();if(e.key==='r')restart();if(e.key==='p'){paused=!paused; if(window.pause) pause.textContent=paused?'Resume':'Pause';}if(e.key===' '&&lastMouse)shoot(lastMouse.x,lastMouse.y)});
document.getElementById('pause').onclick=()=>{if(over)return;paused=!paused;pause.textContent=paused?'Resume':'Pause';};
document.getElementById('restart').onclick=restart;

let __acc2=0,__last2=0;
function loop(ts){
  if(!__last2) __last2=ts;
  let d=(ts-__last2)/16.6667;
  __last2=ts;
  d=Math.max(0,Math.min(3,d));
  __acc2+=d;
  while(__acc2>=1){ update(); __acc2-=1; }
  draw();
  requestAnimationFrame(loop);
}
submitScore(best);restart();requestAnimationFrame(loop);
</script>
</body>
</html>
